<!DOCTYPE html>
<html class="light" lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Cat Pang - 통합 앱</title>

<!-- CDN 및 폰트 로드 -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Quicksand:wght@700&family=Be+Vietnam+Pro:wght@400&display=swap" rel="stylesheet"/>

<!-- 공통 Tailwind 설정 -->

"secondary": "#2c6670", "secondary-container": "#b0e9f4", "secondary-fixed-dim": "#97d0db",
"surface": "#fff8f7", "surface-container": "#fceae9", "surface-container-high": "#f6e4e4", "surface-container-low": "#fff0f0", "surface-container-highest": "#f0dfde", "surface-dim": "#e7d6d6",
"on-surface": "#221919", "on-surface-variant": "#514347", "on-primary": "#ffffff", "on-primary-container": "#7b4458", "on-secondary-container": "#316b74",

},

<!-- 공통 스타일 설정 -->
<style>
.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
.kawaii-button { transition: transform 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 4px 0 0 rgba(0, 0, 0, 0.1); }
.kawaii-button:active { transform: scale(0.95) translateY(2px); box-shadow: 0 2px 0 0 rgba(0, 0, 0, 0.1); }
.floating-paw { animation: float 6s ease-in-out infinite; }
@keyframes float { 0%, 100% { transform: translateY(0) rotate(0deg); } 50% { transform: translateY(-20px) rotate(5deg); } }
.bg-pattern { background-color: #fff8f7; background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm-8 4c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm16 0c-2.2 0-4 1.8-4 4s1.8 4 4 4 4-1.8 4-4-1.8-4-4-4zm-8 10c-4.4 0-8 3.6-8 8s3.6 8 8 8 8-3.6 8-8-3.6-8-8-8z' fill='%23ffb7ce' fill-opacity='0.1' fill-rule='evenodd'/%3E%3C/svg%3E"); }
.glass-card { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 2px solid rgba(255, 255, 255, 0.8); }
.puzzle-tile { transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); aspect-ratio: 1/1; }
.puzzle-tile:active { transform: scale(0.9); }
.puzzle-tile.selected { box-shadow: 0 0 15px #b0e9f4; outline: 3px solid #2c6670; z-index: 10; }
.squishy-button { box-shadow: 0 4px 0 #7b4458; transition: all 0.1s ease; }
.squishy-button:active { transform: translateY(2px); box-shadow: 0 2px 0 #7b4458; }
.floating-sparkle { pointer-events: none; position: absolute; animation: sparkle-float 1.5s ease-out forwards; }
@keyframes sparkle-float { 0% { transform: scale(0) rotate(0deg); opacity: 1; } 100% { transform: scale(1.5) translateY(-40px) rotate(180deg); opacity: 0; } }
.curved-path { stroke-dasharray: 10, 10; animation: dash 20s linear infinite; }
@keyframes dash { to { stroke-dashoffset: -200; } }
.bounce-active:active { transform: scale(0.92); transition: transform 0.1s ease; }
</style>
</head>
<body class="bg-background text-on-surface font-body-md bg-pattern min-h-screen overflow-x-hidden">

<!-- ================= 1. 로비 화면 ================= -->
<div id="screen-lobby" class="game-screen min-h-screen flex flex-col">
<header class="bg-surface shadow-sm flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary">Cat Pang</span>
</div>
<div class="flex items-center gap-3">
<div class="flex items-center bg-surface-container-high px-3 py-1 rounded-full border border-outline-variant">
<span class="material-symbols-outlined text-primary mr-1 text-sm" style="font-variation-settings: 'FILL' 1;">favorite</span>
<span class="font-label-caps text-label-caps text-on-surface">5/5</span>
</div>
<button class="font-label-caps text-label-caps bg-primary text-on-primary px-3 py-1 rounded-full shadow-sm">Lv. 42</button>
</div>
</header>
<main class="flex-grow flex flex-col items-center justify-center relative px-6 pt-8 pb-24">
<div class="w-full max-w-sm mb-12 transform hover:scale-105 transition-transform duration-500 cursor-pointer">
<img class="w-full h-auto drop-shadow-2xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAh1ZWvYQaDiaZY3qWskpHwUTtZGiMdG1yY_rkydb8qw8b8cUETnQ6n58pGbA2YQNXp_yarJd10POK3lGOi_JmM_FYJy9RZUUZo8WWT_0A-DgI4bJ1aMxymkaPXHo8FByBPBIGyfNhFXqgcccg9KE-Z9obBVv2akc9cZVScn8euRkKbdKlFbAU_a_zHliqukw9ok5o98Fs9tCNayUgCqjgXmP0DMeEIMYfFPP1sz7tIaCDAyDSbiCWMINO6SwBIdJ3bNFLoMi85tKo"/>
</div>
<div class="w-full max-w-md grid grid-cols-2 gap-4 mb-12">
<div class="glass-card p-6 rounded-3xl flex flex-col items-center justify-center shadow-lg border-b-4 border-secondary-container">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-1">Current Level</span>
<span class="font-headline-lg text-headline-lg text-secondary">42</span>
</div>
<div class="glass-card p-6 rounded-3xl flex flex-col items-center justify-center shadow-lg border-b-4 border-primary-container">
<span class="font-label-caps text-label-caps text-on-surface-variant uppercase mb-1">High Score</span>
<span class="font-headline-lg text-headline-lg text-primary">12,850</span>
</div>
</div>
<button onclick="navigateTo('screen-map')" class="kawaii-button bg-primary text-on-primary font-headline-xl text-headline-xl px-20 py-8 rounded-full border-b-[6px] border-primary-fixed-variant flex items-center justify-center gap-4 min-w-[280px]">
START <span class="material-symbols-outlined text-4xl" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
</main>
</div>

<!-- ================= 2. 레벨 선택 맵 화면 ================= -->
<div id="screen-map" class="game-screen min-h-screen flex flex-col hidden">
<header class="bg-surface shadow-sm h-16 w-full flex justify-between items-center px-6">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">favorite</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary">Cat Pang</h1>
</div>
<div class="flex items-center gap-4">
<div class="flex items-center bg-white/80 rounded-full px-3 py-1 gap-1 shadow-sm border border-surface-variant">
<span class="material-symbols-outlined text-[#F9A825]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-caps text-label-caps text-on-surface">124</span>
</div>
<div class="bg-secondary-container text-on-secondary-container rounded-full px-4 py-1.5 shadow-sm">
<span class="font-label-caps text-label-caps">Lv. 42</span>
</div>
</div>
</header>
<main class="relative flex-grow pt-10 pb-24 max-w-lg mx-auto w-full px-10">
<div class="flex flex-col gap-16 items-center">
<!-- 레벨 5 (잠금) -->
<div class="relative flex justify-center w-full translate-x-12 opacity-60">
<div class="w-16 h-16 rounded-full bg-slate-400 flex items-center justify-center border-4 border-white shadow-md">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">lock</span>
</div>
</div>
<!-- 레벨 4 (현재 레벨) -->
<div class="relative flex justify-center w-full -translate-x-16">
<div class="absolute -top-10 left-1/2 -translate-x-1/2 bg-primary text-white px-3 py-1 rounded-full text-xs font-bold animate-bounce z-20">Current</div>
<button onclick="navigateTo('screen-game')" class="w-20 h-20 rounded-full bg-primary-container border-4 border-white shadow-[0_6px_0_#864d61] flex items-center justify-center bounce-active relative z-10">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">pets</span>
</button>
</div>
<!-- 레벨 3 (클리어) -->
<div class="relative flex justify-center w-full translate-x-10">
<button onclick="navigateTo('screen-game')" class="w-16 h-16 rounded-full bg-secondary-container border-4 border-white shadow-[0_4px_0_#2c6670] flex items-center justify-center bounce-active">
<span class="font-headline-lg-mobile text-on-secondary-container text-xl">3</span>
</button>
</div>
</div>
<button onclick="navigateTo('screen-lobby')" class="mt-12 mx-auto block text-sm text-primary underline">로비로 돌아가기</button>
</main>
</div>

<!-- ================= 3. 인게임 플레이 화면 ================= -->
<div id="screen-game" class="game-screen min-h-screen flex flex-col hidden">
<header class="bg-surface-container-low shadow-sm h-16 flex items-center justify-between px-6">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">favorite</span>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile font-extrabold text-primary">Cat Pang</h1>
</div>
<button onclick="navigateTo('screen-clear')" class="hover:opacity-80">
<span class="material-symbols-outlined text-slate-500 text-3xl">pause_circle</span>
</button>
</header>
<main class="flex-grow flex flex-col items-center justify-center p-6 max-w-2xl mx-auto w-full">
<div class="w-full mb-6 flex flex-col gap-4">
<div class="flex justify-between items-end px-2">
<div>
<span class="font-label-caps text-label-caps text-slate-500">SCORE</span>
<div class="bg-white px-6 py-2 rounded-2xl shadow-sm border"><span class="font-headline-xl text-primary font-bold">12,450</span></div>
</div>
<div class="text-right">
<span class="font-label-caps text-label-caps text-slate-500">MOVES</span>
<div class="bg-secondary-container px-6 py-2 rounded-2xl font-bold text-secondary text-2xl border-b-4 border-secondary">15</div>
</div>
</div>
</div>

<!-- 퍼즐 판 (7x7 동적 생성) -->
<div class="bg-surface-container p-3 rounded-3xl shadow-lg border-4 border-white aspect-square w-full max-w-[450px]">
<div class="grid grid-cols-7 gap-1 h-full w-full" id="game-grid"></div>
</div>

<!-- 하단 아이템 바 -->
<div class="mt-6 flex gap-4 w-full justify-center">
<button class="squishy-button w-14 h-14 rounded-2xl bg-secondary-container flex items-center justify-center"><span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">bolt</span></button>
<button class="squishy-button w-14 h-14 rounded-2xl bg-secondary-container flex items-center justify-center"><span class="material-symbols-outlined text-secondary" style="font-variation-settings: 'FILL' 1;">auto_fix_high</span></button>
</div>
</main>
</div>

<!-- ================= 4. 스테이지 클리어 화면 (새로 완성됨) ================= -->
<div id="screen-clear" class="game-screen min-h-screen flex flex-col hidden">
<main class="flex-grow flex flex-col items-center justify-center p-6">
<div class="glass-card p-8 rounded-3xl max-w-sm w-full text-center shadow-xl border-b-4 border-primary-container flex flex-col items-center">
<span class="material-symbols-outlined text-6xl text-[#F9A825] mb-2" style="font-variation-settings: 'FILL' 1;">celebration</span>
<h2 class="font-headline-lg text-headline-lg text-primary mb-4 font-bold">STAGE CLEAR!</h2>

<!-- 별 점수 -->
<div class="flex gap-1 mb-6">
<span class="material-symbols-outlined text-4xl text-[#F9A825]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-5xl text-[#F9A825] -mt-2" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-4xl text-[#F9A825]" style="font-variation-settings: 'FILL' 1;">star</span>
</div>

<div class="w-full bg-white/50 rounded-2xl p-4 mb-6 border">
<span class="font-label-caps text-label-caps text-slate-500 block mb-1">FINAL SCORE</span>
<span class="text-3xl font-bold text-secondary">18,450</span>
</div>

<button onclick="navigateTo('screen-lobby')" class="kawaii-button bg-primary text-on-primary font-bold text-lg px-8 py-3 rounded-full w-full border-b-4 border-purple-900">
메인 화면으로
</button>
</div>
</main>
</div>

<!-- ================= 자바스크립트 로직 통합 ================= -->
<script>
// 1. 화면 전환 기능 (SPA 구현)
function navigateTo(screenId) {
document.querySelectorAll('.game-screen').forEach(screen => {
screen.classList.add('hidden');
});
document.getElementById(screenId).classList.remove('hidden');

// 게임 화면으로 이동할 때만 그리드를 새로 생성합니다.
if(screenId === 'screen-game') {
initGameGrid();
}
}

// 2. 인게임 7x7 그리드 타일 동적 생성 및 문법 오타 수정 (백틱 기호 ` 적용)
function initGameGrid() {
const grid = document.getElementById('game-grid');
grid.innerHTML = ''; // 기존 타일 초기화

const icons = [
"https://lh3.googleusercontent.com/aida-public/AB6AXuCKcVthOwWG2a0LVmwpM7qTzkslVKeH5rbfeCMd42oyJmKkelaaq8CiI8e0XmI3dAF99a9wZ9LWqDr90rtY281kldMUEl4CjXi2XNHu494hClvTrkuPz-U2FkW-oWAhdijlYEDQqcC7sIRQCyWCRNsD5xlrASqvXFKYpvjtxxW2qPvaaw_I4aSZOXr0F2TTwbO8UHFcqE98eyf2g7qLLSr_ZS96mePeExE3Xjy1kWXtOzN5bgTssw4_JzbmTqnVsXbWN0Q-p2XrBhA",
"https://lh3.googleusercontent.com/aida-public/AB6AXuB4LuECFtNq0J-6IsrvhvLQuit5dSyBgsUlsQWgj3wNRBU3daoE0aSNMZj6jfiJmq1djzINFFS77SWQwza_EDcsDvhDDSX_SmWI_hVaf_z5ZXdzYj7FePuwLqxH3yk87HQ7h0-rYkEuAl-9e3Sfl9Wizzk9fSpETWQ2MUOswgR1-Zfy_qhM8cfcKJ-Nb6I6wpQMhV4Uu6-cjL--InQFeS6N2f3nrfYZOValzZwRc-yZqVnBDMVbUnEeMCqYwzpDule3vO6Q-qz6rWY",
"https://lh3.googleusercontent.com/aida-public/AB6AXuDrHyLIzRetXwBbmSKCXPEjUduwmX1HdQgCV2lwd6eDi_Ku16x8ElQyvV_XGn5ljhLmEeEbA6cPzylespp-9W70lNeLS2F8y7PwX6WSJhxYOAQEAa_hgG2JAVOXKfQuCwWtmyn4Ki4Q3qiyTZyOoFiKWNPTqVHNbcLm15CUnjxBfCL1RuHgUWs70kmX2q-INZDb_vw5etjPtIAMlO2TljNdKBD9HHs3xmCEHrUptleZzTGTvdouBnjzEAkU2Xigloe4J1O0T7ysF-o"
 ];

for (let i = 0; i < 49; i++) {
const icon = icons[Math.floor(Math.random() * icons.length)];
const tile = document.createElement('div');
tile.className = 'puzzle-tile bg-white rounded-xl shadow-sm cursor-pointer overflow-hidden flex items-center justify-center p-1 border';

// ⭐ [수정완료] 자바스크립트 문자열 내 변수 대입 시 백틱() 기호가 누락되었던 문제를 수정했습니다. tile.innerHTML =`;

tile.onclick = function() {
this.classList.toggle('selected');
if (this.classList.contains('selected')) {
createSparkle(this);
}
};
grid.appendChild(tile);
}
}

// 3. 타일 클릭 시 이펙트 효과
function createSparkle(el) {
const rect = el.getBoundingClientRect();
const sparkle = document.createElement('div');
sparkle.className = 'material-symbols-outlined text-secondary-fixed-dim floating-sparkle';
sparkle.style.left = (rect.left + rect.width / 2) + 'px';
sparkle.style.top = (rect.top + rect.height / 2) + 'px';
sparkle.textContent = 'auto_awesome';
document.body.appendChild(sparkle);
setTimeout(() => sparkle.remove(), 1500);
}
</script>
</body>
</html>
